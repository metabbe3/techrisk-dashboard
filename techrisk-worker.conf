; Supervisor configuration for Techrisk Dashboard
; Place this file in /etc/supervisor/conf.d/techrisk-worker.conf
; Then run: sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start techrisk-worker:*

[program:techrisk-worker]
process_name=%(program_name)s_%(process_num)02d
; Update the path below to match your actual deployment path
command=php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
; Update the user below to match your web server user
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/worker.log
stopwaitsecs=3600

[program:techrisk-worker-scheduled]
process_name=%(program_name)s_%(process_num)02d
; Update the path below to match your actual deployment path
command=php /var/www/html/artisan schedule:work
autostart=true
autorestart=true
; Update the user below to match your web server user
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/scheduler.log

; Group for managing all techrisk workers together
[group:techrisk-workers]
programs=techrisk-worker,techrisk-worker-scheduled
